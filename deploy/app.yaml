# DigitalOcean App Platform Deployment Specification
# Reelin V2 - Fishing Tournament Platform
#
# WARNING: This file mirrors the live DO app spec structure.
# Env var secrets use placeholders — real values are set in the DO dashboard.
# Do NOT run `doctl apps update --spec deploy/app.yaml` without setting real values first.
#
# To view the live spec: doctl apps spec get af49a387-9a7b-407a-9ce9-b4afefd37bb6

name: reelin
region: fra

# =============================================================================
# ALERTS
# =============================================================================
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

# =============================================================================
# DOMAINS
# =============================================================================
domains:
  - domain: www.reelin.ro
    type: PRIMARY

# =============================================================================
# FEATURES
# =============================================================================
features:
  - buildpack-stack=ubuntu-22

# =============================================================================
# INGRESS (routing rules)
# =============================================================================
ingress:
  rules:
    - component:
        name: reelin-backend
      match:
        path:
          prefix: /api
    - component:
        name: reelin-frontend
      match:
        path:
          prefix: /

# =============================================================================
# SERVICES (Backend API)
# =============================================================================
services:
  - name: reelin-backend
    github:
      repo: stnservices/reelin-backend
      branch: main
      deploy_on_push: true
    dockerfile_path: docker/Dockerfile
    http_port: 8000
    instance_size_slug: apps-d-1vcpu-4gb
    source_dir: /

    # Autoscaling
    autoscaling:
      min_instance_count: 1
      max_instance_count: 2
      metrics:
        cpu:
          percent: 85

    # Environment variables (secrets use placeholders — set real values in DO dashboard)
    envs:
      # Security
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # App config
      - key: DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: CORS_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: "https://reelin.ro,https://www.reelin.ro"
      - key: FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        value: "https://www.reelin.ro"

      # Email (AWS SES)
      - key: EMAIL_HOST
        scope: RUN_AND_BUILD_TIME
        value: "email-smtp.eu-central-1.amazonaws.com"
      - key: EMAIL_PORT
        scope: RUN_AND_BUILD_TIME
        value: "587"
      - key: EMAIL_USE_TLS
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: EMAIL_HOST_USER
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DEFAULT_FROM_EMAIL
        scope: RUN_AND_BUILD_TIME
        value: "ReelIn Notifications <noreply@reelin.ro>"

      # OAuth
      - key: GOOGLE_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: FACEBOOK_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: FACEBOOK_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # Stripe
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # External APIs
      - key: OPENWEATHERMAP_API_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: RECAPTCHA_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # Database
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DB_POOL_SIZE
        scope: RUN_AND_BUILD_TIME
        value: "10"
      - key: DB_MAX_OVERFLOW
        scope: RUN_AND_BUILD_TIME
        value: "12"

      # Redis / Celery
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: CELERY_BROKER_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: CELERY_RESULT_BACKEND
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # Firebase
      - key: FIREBASE_CREDENTIALS
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: FIREBASE_DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # DigitalOcean Spaces
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: "reelin"
      - key: DO_SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: "fra1"
      - key: STORAGE_BACKEND
        scope: RUN_AND_BUILD_TIME
        value: "do_spaces"

      # Mobile
      - key: APPLE_BUNDLE_ID
        scope: RUN_AND_BUILD_TIME
        value: "com.stnservices.reelin"

      # Monitoring
      - key: SENTRY_DSN
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: SENTRY_ENVIRONMENT
        scope: RUN_AND_BUILD_TIME
        value: "production"

# =============================================================================
# STATIC SITES (Frontend Admin Dashboard — Vite/React)
# =============================================================================
static_sites:
  - name: reelin-frontend
    github:
      repo: stnservices/reelin-frontend
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
    source_dir: /

    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: "https://www.reelin.ro/api"
      - key: VITE_RECAPTCHA_SITE_KEY
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_GA_MEASUREMENT_ID
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_FIREBASE_API_KEY
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_FIREBASE_AUTH_DOMAIN
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_FIREBASE_PROJECT_ID
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_FIREBASE_STORAGE_BUCKET
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_FIREBASE_APP_ID
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: VITE_GOOGLE_MAPS_API_KEY
        scope: BUILD_TIME
        value: "<set-in-do-dashboard>"

# =============================================================================
# WORKERS (Celery)
# =============================================================================
workers:
  - name: reelin-celery
    github:
      repo: stnservices/reelin-backend
      branch: main
      deploy_on_push: true
    dockerfile_path: docker/Dockerfile
    run_command: "celery -A app.celery_app:celery_app worker --loglevel=info -P prefork --concurrency 2"
    instance_size_slug: apps-s-1vcpu-2gb
    instance_count: 1
    source_dir: /

    envs:
      # Security
      - key: SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # App config
      - key: DEBUG
        scope: RUN_AND_BUILD_TIME
        value: "false"
      - key: CORS_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: "https://reelin.ro,https://www.reelin.ro"
      - key: FRONTEND_URL
        scope: RUN_AND_BUILD_TIME
        value: "https://www.reelin.ro"

      # Email (AWS SES)
      - key: EMAIL_HOST
        scope: RUN_AND_BUILD_TIME
        value: "email-smtp.eu-central-1.amazonaws.com"
      - key: EMAIL_PORT
        scope: RUN_AND_BUILD_TIME
        value: "587"
      - key: EMAIL_USE_TLS
        scope: RUN_AND_BUILD_TIME
        value: "true"
      - key: EMAIL_HOST_USER
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: EMAIL_HOST_PASSWORD
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DEFAULT_FROM_EMAIL
        scope: RUN_AND_BUILD_TIME
        value: "ReelIn Notifications <noreply@reelin.ro>"

      # OAuth
      - key: GOOGLE_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: GOOGLE_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: FACEBOOK_CLIENT_ID
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: FACEBOOK_CLIENT_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # Stripe
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # External APIs
      - key: OPENWEATHERMAP_API_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: RECAPTCHA_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # Database
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DB_SYNC_POOL_SIZE
        scope: RUN_AND_BUILD_TIME
        value: "2"
      - key: DB_SYNC_MAX_OVERFLOW
        scope: RUN_AND_BUILD_TIME
        value: "2"
      - key: DB_CELERY_POOL_SIZE
        scope: RUN_AND_BUILD_TIME
        value: "1"
      - key: DB_CELERY_MAX_OVERFLOW
        scope: RUN_AND_BUILD_TIME
        value: "1"

      # Redis / Celery
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: CELERY_BROKER_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: CELERY_RESULT_BACKEND
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # Firebase
      - key: FIREBASE_CREDENTIALS
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: GOOGLE_CLOUD_CREDENTIALS_JSON
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: FIREBASE_DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"

      # DigitalOcean Spaces
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        value: "<set-in-do-dashboard>"
      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: "reelin"
      - key: DO_SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: "fra1"
      - key: STORAGE_BACKEND
        scope: RUN_AND_BUILD_TIME
        value: "do_spaces"

      # Mobile
      - key: APPLE_BUNDLE_ID
        scope: RUN_AND_BUILD_TIME
        value: "com.stnservices.reelin"

      # Celery-specific
      - key: CELERY_WORKER
        scope: RUN_AND_BUILD_TIME
        value: "1"
